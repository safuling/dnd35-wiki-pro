<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局搜索 — D&D 3.5e 中文Wiki</title>
<link rel="stylesheet" href="style.css">
<style>
  .search-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 12px;
    padding: 28px 32px;
    margin: 20px 0;
  }
  .search-hero h2 {
    color: #fff;
    margin: 0 0 20px;
    font-size: 1.4rem;
  }
  .search-input-group {
    display: flex;
    gap: 10px;
  }
  .search-input-group input {
    flex: 1;
    padding: 12px 18px;
    border: 2px solid #d4a017;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    background: rgba(255,255,255,0.95);
  }
  .search-input-group input:focus {
    border-color: #f39c12;
    box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.2);
  }
  .search-input-group button {
    padding: 12px 32px;
    background: #d4a017;
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }
  .search-input-group button:hover {
    background: #f39c12;
    transform: translateY(-1px);
  }

  /* 过滤器 */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    transition: 0.2s;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* 搜索结果 */
  .results-section {
    margin: 24px 0;
  }
  .results-category {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-heading);
    margin: 20px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .results-category .count {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 8px 0;
    box-shadow: var(--shadow-soft);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .result-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-card);
    border-color: var(--accent);
  }
  .result-card h3 {
    margin: 0 0 8px;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .result-card h3 a {
    color: inherit;
    text-decoration: none;
  }
  .result-card h3 a:hover {
    text-decoration: underline;
  }
  .result-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .result-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .result-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.78rem;
    border: 1px solid;
  }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
  }
  .no-results-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .stats-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .stats-item {
    text-align: center;
  }
  .stats-number {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stats-label {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .search-hero {
      padding: 20px;
    }
    .search-input-group {
      flex-direction: column;
    }
    .filter-bar {
      justify-content: center;
    }
  }
</style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar">
  <div class="navbar-brand">🐉 D&D 3.5e 中文Wiki</div>
  <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
  <div class="navbar-links" id="navbarLinks">
    <a href="index.html">首页</a>
    <a href="rules.html">核心规则</a>
    <a href="spells/intro.html">法术</a>
    <a href="classes/intro.html">职业</a>
    <a href="races/intro.html">种族</a>
    <a href="feats/intro.html">专长</a>
    <a href="skills/intro.html">技能</a>
    <a href="equipment/intro.html">装备</a>
    <a href="monsters/intro.html">怪物</a>
    <a href="3r/index-v2.html" class="nav-3r">⚡ 3R拓展</a>
    <a href="conflicts.html">规则冲突</a>
  </div>
  <div class="navbar-search">
    <input type="text" placeholder="搜索所有内容..." id="searchInput" onkeydown="if(event.key==='Enter')performSearch()">
    <button onclick="performSearch()">搜索</button>
  </div>
</nav>

<div class="layout">
  <main class="main-content">

    <!-- 搜索区域 -->
    <div class="search-hero">
      <h2>🔍 全局搜索</h2>
      <div class="search-input-group">
        <input type="text" id="searchQuery" placeholder="输入关键词搜索法术、职业、种族、专长、技能、怪物、装备..." autofocus>
        <button onclick="performSearch()">搜索</button>
      </div>
      <p style="color: rgba(255,255,255,0.7); margin-top: 12px; font-size: 0.9rem;">
        提示：支持中文、英文、拼音搜索。例如："火球"、"fireball"、"法术"、"职业"等
      </p>
    </div>

    <!-- 快速过滤器 -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterResults('all', this)">全部</button>
      <button class="filter-btn" onclick="filterResults('法术', this)">🔮 法术</button>
      <button class="filter-btn" onclick="filterResults('职业', this)">⚔️ 职业</button>
      <button class="filter-btn" onclick="filterResults('种族', this)">🧝 种族</button>
      <button class="filter-btn" onclick="filterResults('专长', this)">⭐ 专长</button>
      <button class="filter-btn" onclick="filterResults('技能', this)">🎯 技能</button>
      <button class="filter-btn" onclick="filterResults('怪物', this)">👹 怪物</button>
      <button class="filter-btn" onclick="filterResults('装备', this)">🗡️ 装备</button>
    </div>

    <!-- 统计信息 -->
    <div class="stats-bar" id="statsBar" style="display: none;">
      <div class="stats-item">
        <div class="stats-number" id="totalCount">0</div>
        <div class="stats-label">总结果</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="spellCount">0</div>
        <div class="stats-label">法术</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="classCount">0</div>
        <div class="stats-label">职业</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="raceCount">0</div>
        <div class="stats-label">种族</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="featCount">0</div>
        <div class="stats-label">专长</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="skillCount">0</div>
        <div class="stats-label">技能</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="monsterCount">0</div>
        <div class="stats-label">怪物</div>
      </div>
      <div class="stats-item">
        <div class="stats-number" id="equipmentCount">0</div>
        <div class="stats-label">装备</div>
      </div>
    </div>

    <!-- 搜索结果 -->
    <div id="searchResults"></div>

    <!-- 默认提示 -->
    <div id="defaultMessage" style="text-align: center; padding: 48px; color: var(--text-muted);">
      <div style="font-size: 3rem; margin-bottom: 16px;">🔍</div>
      <h3 style="margin-bottom: 12px;">开始搜索</h3>
      <p>在搜索框中输入关键词，搜索 D&D 3.5e 的所有内容</p>
      <div style="margin-top: 24px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        <button class="filter-btn" onclick="quickSearch('火球')">火球术</button>
        <button class="filter-btn" onclick="quickSearch('战士')">战士</button>
        <button class="filter-btn" onclick="quickSearch('人类')">人类</button>
        <button class="filter-btn" onclick="quickSearch('顺势攻击')">顺势攻击</button>
        <button class="filter-btn" onclick="quickSearch('聆听')">聆听</button>
        <button class="filter-btn" onclick="quickSearch('龙')">龙</button>
      </div>
    </div>

  </main>
</div>

<!-- JavaScript -->
<script src="js/global-search-data.js"></script>
<script>
  // 从URL参数获取搜索查询
  function getQueryFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('q') || '';
  }

  // 执行搜索
  function performSearch() {
    const query = document.getElementById('searchQuery').value.trim();
    if (!query) return;

    // 更新URL
    window.history.pushState({}, '', `?q=${encodeURIComponent(query)}`);

    // 执行搜索
    const results = globalSearch(query);
    displayResults(results, query);
  }

  // 快速搜索
  function quickSearch(query) {
    document.getElementById('searchQuery').value = query;
    performSearch();
  }

  // 显示搜索结果
  function displayResults(results, query) {
    const resultsContainer = document.getElementById('searchResults');
    const defaultMessage = document.getElementById('defaultMessage');
    const statsBar = document.getElementById('statsBar');

    // 隐藏默认提示
    defaultMessage.style.display = 'none';

    if (results.length === 0) {
      resultsContainer.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">😔</div>
          <h3>未找到匹配结果</h3>
          <p>没有找到与"${escapeHtml(query)}"相关的内容。请尝试其他关键词。</p>
        </div>
      `;
      statsBar.style.display = 'none';
      return;
    }

    // 显示统计信息
    updateStats(results);
    statsBar.style.display = 'flex';

    // 按类别分组
    const grouped = {};
    results.forEach(item => {
      const category = item.category;
      if (!grouped[category]) grouped[category] = [];
      grouped[category].push(item);
    });

    // 生成结果HTML
    let html = '';
    const categoryOrder = ['法术', '职业', '种族', '专长', '技能', '怪物', '装备'];

    categoryOrder.forEach(category => {
      if (!grouped[category]) return;

      html += `
        <div class="results-section" data-category="${category}">
          <div class="results-category">
            ${getCategoryIcon(category)} ${category}
            <span class="count">(${grouped[category].length})</span>
          </div>
      `;

      grouped[category].forEach(item => {
        html += generateResultCard(item);
      });

      html += '</div>';
    });

    resultsContainer.innerHTML = html;
  }

  // 生成结果卡片
  function generateResultCard(item) {
    let metaInfo = '';
    let url = item.url || '#';

    switch (item.category) {
      case '法术':
        metaInfo = `
          <span>等级: ${item.level}</span>
          <span>学派: ${item.school}</span>
          ${item.source ? `<span class="result-badge" style="color: ${item.source === 'PHB' ? '#2ecc71' : '#9b59b6'}; border-color: ${item.source === 'PHB' ? '#2ecc71' : '#9b59b6'}">${item.source}</span>` : ''}
        `;
        break;
      case '职业':
        metaInfo = `
          <span>生命骰: ${item.hitDie}</span>
          <span>攻击加值: ${item.baseAttack}</span>
        `;
        break;
      case '种族':
        metaInfo = `
          <span>体型: ${item.size}</span>
          <span>速度: ${item.speed}</span>
          ${item.abilityAdjust ? `<span>属性调整: ${item.abilityAdjust}</span>` : ''}
        `;
        break;
      case '专长':
        metaInfo = `
          ${item.prerequisite ? `<span>先决条件: ${item.prerequisite}</span>` : ''}
          ${item.benefit ? `<span>益处: ${item.benefit}</span>` : ''}
        `;
        break;
      case '技能':
        metaInfo = `
          <span>关键属性: ${item.keyAbility}</span>
          ${item.trained ? '<span>需要训练</span>' : '<span>无需训练</span>'}
        `;
        break;
      case '怪物':
        metaInfo = `
          <span>CR: ${item.cr}</span>
          <span>体型: ${item.size}</span>
          <span>类型: ${item.typeMonster}</span>
        `;
        break;
      case '装备':
        metaInfo = `
          ${item.price ? `<span>价格: ${item.price}</span>` : ''}
          ${item.damage ? `<span>伤害: ${item.damage}</span>` : ''}
          ${item.armorBonus ? `<span>护甲加值: +${item.armorBonus}</span>` : ''}
        `;
        break;
    }

    return `
      <div class="result-card" onclick="location.href='${url}'">
        <h3><a href="${url}">${getTypeIcon(item.type)} ${item.nameZh} <small style="color: var(--text-muted); font-weight: 400;">(${item.nameEn})</small></a></h3>
        <div class="result-meta">
          ${metaInfo}
        </div>
      </div>
    `;
  }

  // 更新统计信息
  function updateStats(results) {
    const counts = {
      '法术': 0,
      '职业': 0,
      '种族': 0,
      '专长': 0,
      '技能': 0,
      '怪物': 0,
      '装备': 0
    };

    results.forEach(item => {
      counts[item.category]++;
    });

    document.getElementById('totalCount').textContent = results.length;
    document.getElementById('spellCount').textContent = counts['法术'];
    document.getElementById('classCount').textContent = counts['职业'];
    document.getElementById('raceCount').textContent = counts['种族'];
    document.getElementById('featCount').textContent = counts['专长'];
    document.getElementById('skillCount').textContent = counts['技能'];
    document.getElementById('monsterCount').textContent = counts['怪物'];
    document.getElementById('equipmentCount').textContent = counts['装备'];
  }

  // 过滤结果
  function filterResults(category, btn) {
    // 更新按钮状态
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const resultsContainer = document.getElementById('searchResults');
    const sections = resultsContainer.querySelectorAll('.results-section');

    if (category === 'all') {
      sections.forEach(section => section.style.display = '');
    } else {
      sections.forEach(section => {
        if (section.dataset.category === category) {
          section.style.display = '';
        } else {
          section.style.display = 'none';
        }
      });
    }
  }

  // 获取类别图标
  function getCategoryIcon(category) {
    const icons = {
      '法术': '🔮',
      '职业': '⚔️',
      '种族': '🧝',
      '专长': '⭐',
      '技能': '🎯',
      '怪物': '👹',
      '装备': '🗡️'
    };
    return icons[category] || '📄';
  }

  // HTML转义
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 页面加载时检查URL参数
  window.addEventListener('DOMContentLoaded', () => {
    const query = getQueryFromURL();
    if (query) {
      document.getElementById('searchQuery').value = query;
      performSearch();
    }

    // 为导航栏搜索框添加事件
    const navSearchInput = document.getElementById('searchInput');
    if (navSearchInput) {
      navSearchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const q = navSearchInput.value.trim();
          if (q) {
            window.location.href = `global-search.html?q=${encodeURIComponent(q)}`;
          }
        }
      });
    }
  });
</script>

<!-- 移动端菜单脚本 -->
<script>
  function toggleMobileMenu() {
    const navLinks = document.getElementById('navbarLinks');
    if (navLinks) {
      navLinks.classList.toggle('mobile-open');
    }
  }
</script>

</body>
</html>
