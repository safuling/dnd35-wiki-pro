<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领域数据加载测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    .ok { color: green; } .err { color: red; }
    pre { background: #fff; padding: 10px; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">🐉 D&D 3.5e 中文Wiki</div>
  <div class="navbar-links" id="mainNav">
    <a href="index.html" class="active">首页</a>
    <a href="rules.html">核心规则</a>
    <a href="spells/intro.html">法术</a>
    <a href="classes/intro.html">职业</a>
    <a href="races/intro.html">种族</a>
    <a href="feats/intro.html">专长</a>
    <a href="skills/intro.html">技能</a>
    <a href="equipment/intro.html">装备</a>
    <a href="monsters/intro.html">怪物</a>
    <a href="3r/index-v2.html" style="color:#d4a017;font-weight:600;">⚡ 3R拓展</a>
    <a href="conflicts.html">规则冲突</a>
  </div>
  <div class="navbar-search">
    <input type="text" placeholder="搜索所有内容..." id="searchInput" onkeydown="if(event.key==='Enter')location.href='global-search.html?q='+encodeURIComponent(this.value)">
    <button onclick="location.href='global-search.html?q='+encodeURIComponent(document.getElementById('searchInput').value)">搜索</button>
  </div>
  <button class="mobile-menu-btn" onclick="document.getElementById('mainNav').classList.toggle('mobile-open')" aria-label="菜单">☰</button>
</nav>
  <h1>领域数据加载测试</h1>
  <div id="out"></div>

  <!-- 必须在 DOMContentLoaded 之前加载 -->
  <script src="../js/spells-domains.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      var d = document.getElementById('out');
      var h = '';
      // 检查 SPELL_DOMAINS
      if (typeof SPELL_DOMAINS !== 'undefined') {
        h += '<p class="ok">✅ SPELL_DOMAINS 已加载，共 ' + Object.keys(SPELL_DOMAINS).length + ' 个映射</p>';
        h += '<pre>' + JSON.stringify(SPELL_DOMAINS, null, 2).substring(0, 500) + '...</pre>';
      } else {
        h += '<p class="err">❌ SPELL_DOMAINS 未定义</p>';
      }
      // 检查 ALL_DOMAINS
      if (typeof ALL_DOMAINS !== 'undefined') {
        h += '<p class="ok">✅ ALL_DOMAINS 已加载，共 ' + ALL_DOMAINS.length + ' 个领域</p>';
        h += '<pre>' + JSON.stringify(ALL_DOMAINS, null, 2) + '</pre>';
      } else {
        h += '<p class="err">❌ ALL_DOMAINS 未定义</p>';
      }
      // 检查 DOMAIN_NAMES
      if (typeof DOMAIN_NAMES !== 'undefined') {
        h += '<p class="ok">✅ DOMAIN_NAMES 已加载，共 ' + Object.keys(DOMAIN_NAMES).length + ' 个名称</p>';
        h += '<pre>' + JSON.stringify(DOMAIN_NAMES, null, 2) + '</pre>';
      } else {
        h += '<p class="err">❌ DOMAIN_NAMES 未定义</p>';
      }
      d.innerHTML = h;
    });
  </script>
</body>
</html>
